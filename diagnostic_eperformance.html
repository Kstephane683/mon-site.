<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Diagnostic Stratégique — ePerformance</title>
<meta name="description" content="Obtenez votre diagnostic stratégique personnalisé. Calculez vos ratios réels et identifiez vos 3 failles prioritaires en 5 minutes."/>
<link rel="canonical" href="https://eperformance.pro/diagnostic_eperformance"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{colors:{brand:{50:'#f0f7ff',100:'#e0effe',200:'#bae0fd',300:'#7cc8fb',400:'#38abf7',500:'#0e91e9',600:'#0274c7',700:'#035da1',800:'#074e84',900:'#0c426e',950:'#082a4a'}},fontFamily:{serif:['Cormorant Garamond','serif'],sans:['DM Sans','sans-serif']}}}}
</script>
<style>
body{font-family:'DM Sans',sans-serif;background-color:#020617;color:#f8fafc;scroll-behavior:smooth}
.glass-card{background:rgba(15,23,42,0.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08)}
.step-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all .3s}
.step-dot.active{background:#38abf7;box-shadow:0 0 12px #38abf7;transform:scale(1.2)}
</style>
</head>
<body>

<div class="min-h-screen flex flex-col items-center justify-center p-4">
    <div id="diag-container" class="w-full max-w-2xl glass-card rounded-3xl p-8 md:p-12 relative overflow-hidden">
        <form id="diag-form" class="space-y-8">
            <div id="step-1">
                <h1 class="text-3xl font-serif font-bold mb-2">Identité</h1>
                <input type="text" name="nom" placeholder="Nom Complet" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 outline-none focus:border-brand-400">
                <input type="tel" name="whatsapp" placeholder="WhatsApp" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mt-4 outline-none focus:border-brand-400">
                <button type="button" onclick="nextStep(2)" class="w-full bg-brand-500 py-4 rounded-xl font-bold mt-6">Continuer</button>
            </div>
            
            </form>

        <div id="result-area" class="hidden text-center space-y-6">
            <h2 class="text-4xl font-serif font-bold text-brand-400">Analyse Terminée</h2>
            <div id="display-score" class="text-6xl font-bold">--/100</div>
            <div id="ai-analysis" class="text-left bg-white/5 p-6 rounded-2xl border border-white/10 italic text-slate-300">
                L'IA analyse vos résultats...
            </div>
        </div>
    </div>
</div>

<script>
// --- LA MODIFICATION CRUCIALE EST ICI ---
const API_URL = 'https://api.eperformance.pro/send_diag.php';

async function finalSubmit() {
    const form = document.getElementById('diag-form');
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    // On prépare l'affichage du chargement
    document.getElementById('diag-form').classList.add('opacity-50', 'pointer-events-none');
    
    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success) {
            document.getElementById('diag-form').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('display-score').textContent = result.score + '/100';
            document.getElementById('ai-analysis').innerHTML = result.analyse.replace(/\n/g, '<br>');
        } else {
            alert("Erreur : " + result.error);
        }
    } catch (e) {
        alert("Erreur de connexion avec le moteur LWS. Vérifiez le HTTPS sur api.eperformance.pro");
    }
}

// Fonction pour passer d'une étape à l'autre (à adapter selon ton code)
function nextStep(n) {
    if(n > 1) { /* Logique de validation */ }
    // Si c'est la dernière étape, appeler finalSubmit() au lieu de l'ancien fetch Netlify
}
</script>

</body>
</html>
